{% extends "base.html" %}
{% block title %}{{ 'Edit' if machine else 'Add' }} Machine - Stretch Pricing{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow">
      <div class="card-header">
        <h5 class="mb-0">{{ 'Edit Machine' if machine else 'Add Machine' }}</h5>
      </div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Machine name</label>
            <input type="text" name="name" class="form-control"
                   value="{{ machine[1] if machine else '' }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Utilization rate (%)</label>
            <input type="number" name="utilization_rate" min="0" max="100" step="0.1"
                   class="form-control"
                   value="{{ (machine[2]*100)|round(1) if machine else '85.0' }}" required>
          </div>

          <div class="d-flex justify-content-between">
            <a href="{{ url_for('machines.index') }}" class="btn btn-outline-secondary">
              Cancel
            </a>
            <button type="submit" class="btn btn-primary">
              Save
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
